<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>BIOCODED // PAINEL DO MESTRE</title>
<style>
  :root{--g:#00ff88;}
  *{box-sizing:border-box;}
  body{margin:0;background:#03070a;color:var(--g);font-family:'Share Tech Mono',ui-monospace,monospace;padding:24px;}
  h1{font-size:20px;letter-spacing:3px;margin:0 0 4px;}
  .sub{font-size:12px;color:rgba(0,255,136,0.5);margin-bottom:20px;}
  .bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:18px;}
  input{background:transparent;border:1px solid rgba(0,255,136,0.3);color:var(--g);padding:9px 12px;border-radius:6px;outline:none;font-family:inherit;font-size:13px;min-width:220px;}
  button{background:transparent;border:1px solid var(--g);color:var(--g);padding:9px 14px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:12px;letter-spacing:1px;}
  button:hover{background:rgba(0,255,136,0.12);}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
  .card{border:1px solid rgba(0,255,136,0.25);border-radius:10px;padding:16px;background:rgba(0,255,136,0.03);}
  .card h2{font-size:15px;margin:0 0 6px;letter-spacing:1px;}
  .meta{font-size:11px;color:rgba(0,255,136,0.55);line-height:1.7;}
  .id{font-size:10px;color:rgba(0,255,136,0.4);word-break:break-all;margin-top:6px;}
  .acts{display:flex;gap:8px;margin-top:12px;}
  .acts a{flex:1;text-align:center;text-decoration:none;color:var(--g);border:1px solid rgba(0,255,136,0.4);border-radius:6px;padding:7px 0;font-size:11px;}
  .acts a:hover{background:rgba(0,255,136,0.12);}
  .empty{color:rgba(0,255,136,0.5);font-size:13px;margin-top:20px;}
  .warn{color:#ff9900;font-size:13px;margin-top:20px;line-height:1.7;}
  code{color:#fff;}
  .gate{max-width:460px;margin:60px auto;text-align:center;}
  .gate p{font-size:13px;color:rgba(0,255,136,0.6);line-height:1.7;margin:14px 0 22px;}
  #gbtn{font-size:14px;padding:12px 22px;}
</style>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<!-- ===== COLE AQUI OS MESMOS DADOS DO SEU index.html ===== -->
<script>
var CLOUD={
  url:'https://wheanskxobszhatpyyqk.supabase.co',
  key:'sb_publishable_X_79kaZaQ6V-je5uANotdg_WDJxfTsB'
};
</script>
<!-- ======================================================= -->

<h1>BIOCODED // PAINEL DO MESTRE</h1>
<div class="sub">Todas as unidades do grupo, atualizadas em tempo real.</div>

<!-- tela de login (some quando logado) -->
<div id="gate" class="gate" style="display:none;">
  <p>Entre com a conta de <b>mestre</b> para ver as fichas do grupo.</p>
  <button id="gbtn" onclick="login()">Entrar com Google</button>
  <div id="gate-msg" class="warn" style="display:none;"></div>
</div>

<!-- painel (some quando deslogado) -->
<div id="panel" style="display:none;">
  <div class="bar">
    <input id="q" placeholder="filtrar por nome ou ID..." oninput="render()"/>
    <button onclick="load()">🔄 ATUALIZAR</button>
    <button onclick="logout()">SAIR</button>
    <span id="who" class="meta"></span>
    <span id="count" class="meta"></span>
  </div>
  <div id="out"></div>
</div>

<script>
var APP_URL='index.html'; // link base das fichas (mesmo diretorio)
var ROWS=[];
var CLOUD_ON=(CLOUD.url.indexOf('http')===0 && CLOUD.key.length>20);
var SB=null,SESSION=null;
try{ if(window.supabase&&CLOUD_ON)SB=window.supabase.createClient(CLOUD.url,CLOUD.key); }catch(e){}

function token(){return SESSION?SESSION.access_token:CLOUD.key;}
function headers(){return {'apikey':CLOUD.key,'Authorization':'Bearer '+token()};}
function esc(s){return String(s==null?'':s).replace(/[&<>]/g,function(c){return({'&':'&amp;','<':'&lt;','>':'&gt;'})[c];});}
function when(t){if(!t)return'—';try{var d=new Date(t);return d.toLocaleString();}catch(e){return t;}}
function gmsg(t){var m=document.getElementById('gate-msg');if(m){m.style.display='';m.textContent=t;}}

function login(){ if(!SB){gmsg('Login indisponível (sem conexão).');return;} try{SB.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.origin+location.pathname}});}catch(e){} }
function logout(){ if(SB)try{SB.auth.signOut();}catch(e){} }

function setAuth(session){
  SESSION=session;var logged=!!session;
  document.getElementById('gate').style.display=logged?'none':'';
  document.getElementById('panel').style.display=logged?'':'none';
  if(logged){var w=document.getElementById('who');if(w)w.textContent=(session.user&&session.user.email)||'';load();}
}

function load(){
  if(!SESSION)return;
  document.getElementById('out').innerHTML='<div class="empty">carregando...</div>';
  fetch(CLOUD.url+'/rest/v1/sheets?select=id,name,data,updated_at&order=updated_at.desc',{headers:headers()})
    .then(function(r){return r.json();})
    .then(function(rows){ROWS=Array.isArray(rows)?rows:[];render();})
    .catch(function(){document.getElementById('out').innerHTML='<div class="warn">⚠ Não consegui conectar. Confira sua conexão.</div>';});
}

function render(){
  var q=(document.getElementById('q').value||'').trim();
  if(q.indexOf('#')>=0)q=q.split('#').pop();
  q=q.toLowerCase();
  var list=ROWS.filter(function(r){
    var hay=((r.name||'')+' '+(r.id||'')).toLowerCase();
    return hay.indexOf(q)>=0;
  });
  document.getElementById('count').textContent=list.length+' / '+ROWS.length+' unidades';
  if(!list.length){document.getElementById('out').innerHTML='<div class="empty">Nenhuma unidade.</div>';return;}
  var html='<div class="grid">';
  list.forEach(function(r){
    var d=r.data||{};
    var arc=esc(d.arc||'—'), cls=esc(d.cls||'—'), fac=d.faction?(' // '+esc(d.faction)):'';
    var link=APP_URL+'#'+encodeURIComponent(r.id);
    html+='<div class="card">'+
      '<h2>'+esc(d.name||r.id)+'</h2>'+
      '<div class="meta">'+arc+fac+'<br>classe: '+cls+'<br>sinal: '+esc(d.signal||0)+' &nbsp; relíquias: '+esc(d.relics||0)+'<br>atualizada: '+when(r.updated_at)+'</div>'+
      '<div class="id">'+esc(r.id)+'</div>'+
      '<div class="acts"><a href="'+link+'" target="_blank">ABRIR FICHA</a>'+
      '<a href="#" onclick="navigator.clipboard&&navigator.clipboard.writeText(location.origin+location.pathname.replace(/mestre\\.html$/,\'\')+\''+link+'\');this.textContent=\'COPIADO\';return false;">COPIAR LINK</a>'+
      '<a href="#" style="flex:0 0 auto;color:#ff6b6b;border-color:rgba(255,90,90,0.4);" title="apagar" onclick="del(\''+esc(r.id)+'\');return false;">🗑</a></div>'+
      '</div>';
  });
  html+='</div>';
  document.getElementById('out').innerHTML=html;
}

function del(id){
  if(!SESSION||!id)return;
  var row=ROWS.filter(function(x){return x.id===id;})[0];
  var name=(row&&row.data&&row.data.name)?row.data.name:id;
  if(!confirm('Apagar a unidade "'+name+'" para sempre? Isto não pode ser desfeito.'))return;
  fetch(CLOUD.url+'/rest/v1/sheets?id=eq.'+encodeURIComponent(id),{method:'DELETE',headers:Object.assign(headers(),{'Prefer':'return=minimal'})})
    .then(function(r){if(r&&r.ok){ROWS=ROWS.filter(function(x){return x.id!==id;});render();}else alert('Não foi possível apagar (sem permissão?).');})
    .catch(function(){alert('Erro ao apagar.');});
}
if(SB){
  SB.auth.getSession().then(function(r){setAuth(r&&r.data?r.data.session:null);});
  SB.auth.onAuthStateChange(function(_e,s){setAuth(s);});
}else{
  document.getElementById('gate').style.display='';
  gmsg('⚠ Configuração do Supabase ausente neste arquivo.');
}
setInterval(function(){if(SESSION)load();},12000);
window.addEventListener('focus',function(){if(SESSION)load();});
</script>
</body>
</html>
